</head>

                <i class='bx bxs-watch nav__logo-icon'></i> Al Sheikh 
            </a>

            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="index.html" class="nav__link active-link">Home</a>
                    </li>
                    <li class="nav__item">
                        <a href="#" class="nav__link">Products</a>
                        <ul class="dropdown-content">

                    </li>
                    <li class="nav__item">

    <main class="main">
    
    <div class="auth-page">
        <div class="auth-container">
            <h2 class="auth-title">إنشاء حساب جديد</h2>
            
            <form action="#" class="auth-form">
                <div class="auth-input-group">
                    <label for="fullname" class="auth-label">الاسم الكامل</label>
                    <input type="text" id="fullname" placeholder="أدخل اسمك الثلاثي" class="auth-input" required>
                </div>

                <div class="auth-input-group">
                    <label for="email" class="auth-label">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@domain.com" class="auth-input" required>
                </div>
                
                <div class="auth-input-group">
                    <label for="password" class="auth-label">كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة مرور قوية" class="auth-input" required>
                </div>

                <div class="auth-input-group">
                    <label for="confirm-password" class="auth-label">تأكيد كلمة المرور</label>
                    <input type="password" id="confirm-password" placeholder="أعد كتابة كلمة المرور" class="auth-input" required>
                </div>
                
                <div class="auth-checkbox-group">
                    <input type="checkbox" id="terms" class="auth-checkbox" required>
                    <label for="terms" class="auth-label-inline">أوافق على الشروط والأحكام وسياسة الخصوصية لمتجر الشيخ.</label>
                </div>

                <button type="submit" class="button auth-submit-btn">إنشاء الحساب</button>
                
                <div class="auth-footer">
                    <span class="auth-text">لديك حساب بالفعل؟ </span>
                    <a href="SignIn.html" class="auth-link">تسجيل الدخول من هنا</a>
                </div>
            </form>
        </div>
    </div>
    </main>
    
</body>
</html>
