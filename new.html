 <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- 1. Dark Mode ---
        const themeButton = document.getElementById('theme-button');
        const darkTheme = 'dark-theme';
        const iconTheme = 'bx-sun'; 
        if (themeButton) {
            themeButton.addEventListener('click', () => {
                document.body.classList.toggle(darkTheme);
                themeButton.classList.toggle(iconTheme);
            });
        }

        // --- 2. السلة (Cart) ---
        const cartShop = document.getElementById('cart-shop');
        const cartContainer = document.getElementById('cart-container');
        const cartItems = document.getElementById('cart-items');

        if (cartShop && cartContainer) {
            cartShop.addEventListener('click', () => {
                const isHidden = cartContainer.style.display === 'none' || cartContainer.style.display === '';
                cartContainer.style.display = isHidden ? 'block' : 'none';
            });
        }

    // داخل دالة الضغط على زر الإضافة
document.querySelectorAll('.products__button').forEach(btn => {
    btn.addEventListener('click', (e) => {
        const card = e.target.closest('.products__card');
        // داخل دالة الإضافة للسلة
        const product = {
            title: card.querySelector('.products__title').innerText,
            price: card.querySelector('.products__price').innerText,
            img: card.querySelector('.products__img').getAttribute('src') // تأكد من استخدام getAttribute
        };

        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        cart.push(product);
        localStorage.setItem('myCart', JSON.stringify(cart));
        
        alert("تمت إضافة المنتج للسلة!");
    });
});

// تعديل زر السلة في الهيدر لينقلك للصفحة الجديدة
document.getElementById('cart-shop').addEventListener('click', () => {
    window.location.href = 'Cart.html';
});

        // --- 3. البحث ---
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.products__card').forEach(card => {
                    const title = card.querySelector('.products__title').innerText.toLowerCase();
                    card.style.display = title.includes(term) ? "" : "none";
                });
            });
        }
    });
        /* ================= SHOW MENU ================= */
const navMenu = document.getElementById('nav-menu'),
      navToggle = document.getElementById('nav-toggle'),
      navClose = document.getElementById('nav-close')

/* ===== Menu Show ===== */
/* Validate if constant exists */
if(navToggle){
    navToggle.addEventListener('click', () =>{
        navMenu.classList.add('show-menu')
    })
}

/* ===== Menu Hidden ===== */
/* Validate if constant exists */
if(navClose){
    navClose.addEventListener('click', () =>{
        navMenu.classList.remove('show-menu')
    })
}
</script>
